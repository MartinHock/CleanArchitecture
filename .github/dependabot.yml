version: 2

updates:
  - package-ecosystem: "nuget"
    directory: "/"

    schedule:
      interval: "daily"
      time: "16:45"
      timezone: "Europe/Berlin"

 
    open-pull-requests-limit: 10

    groups:
      microsoft-packages:
        patterns:
          - "Microsoft.*"
        update-types:
          - "minor"
          - "patch"

      test-packages:
        patterns:
          - "Microsoft.NET.Test.Sdk"
          - "xunit*"
          - "NUnit*"
          - "coverlet*"
          - "FluentAssertions"
        update-types:
          - "minor"
          - "patch"

      all-other-non-major:
        patterns:
          - "*"
        exclude-patterns:
          - "Microsoft.*"
          - "Microsoft.NET.Test.Sdk"
          - "xunit*"
          - "NUnit*"
          - "coverlet*"
          - "FluentAssertions"
        update-types:
          - "minor"
          - "patch"

    commit-message:
      prefix: "deps"
      include: "scope"

    labels:
      - "dependencies"
      - "nuget"
