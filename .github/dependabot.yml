version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    groups:
      security-patches:
        applies-to: "security-updates"
        patterns:
          - "*"
      microsoft-packages:
        applies-to: "version-updates"
        patterns:
          - "Microsoft.*"
          - "System.*"
      aspire-packages:
        applies-to: "version-updates"
        patterns:
          - "Aspire.*"
      opentelemetry-packages:
        applies-to: "version-updates"
        patterns:
          - "OpenTelemetry.*"
      ardalis-packages:
        applies-to: "version-updates"
        patterns:
          - "Ardalis.*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
